stages:
  download:
    cmd: python -m src.data.downloader
    deps:
    - src/data/downloader.py
    outs:
    - data/raw
  preprocess:
    cmd: python -m src.data.preprocessor
    deps:
    - data/raw
    - src/data/preprocessor.py
    outs:
    - data/processed/stream.parquet
    - data/processed/train.parquet
  feature_engineering:
    cmd: python -m src.features.engineer
    deps:
    - data/processed/train.parquet
    - src/features/engineer.py
    outs:
    - data/processed/train_features.parquet
  train:
    cmd: python -m src.training.train
    deps:
    - config.py
    - data/processed/train_features.parquet
    - src/training/train.py
    outs:
    - artifacts/plots:
        persist: true
